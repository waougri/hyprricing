# ~/.config/foot/foot.ini

# Global settings
shell=/bin/bash
term=foot
login-shell=no

# Window setup
app-id=foot
title=terminal
locked-title=no

# Typography
font=Google Sans Code NF:style=Medium:size=11
font-bold=Google Sans Code NF:style=Bold:size=11
font-italic=Google Sans Code NF:style=Italic:size=11
font-bold-italic=Google Sans Code NF:style=Bold Italic:size=11
line-height=14
letter-spacing=0
horizontal-letter-offset=0
vertical-letter-offset=0
underline-thickness=1.5
box-drawings-uses-font-glyphs=no
dpi-aware=yes

# Padding & Layout
pad=12x12
resize-by-cells=no

# Window Borders and Decoration
[environment]

[bell]

[scrollback]
lines=10000
multiplier=3.0
indicator-position=none

[url]
osc8-underline=url-mode
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh

[cursor]
style=block
blink=no
beam-thickness=1.5
underline-thickness=1.5

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

# Theme & Transparency (Catppuccin Mocha)
[colors-dark]
alpha=0.85
background=11111b
foreground=cdd6f4

## Explicit cursor color override (Text inside cursor, Cursor background)
cursor=11111b cdd6f4

## Normal colors
regular0=45475a  # surface1
regular1=f38ba8  # red
regular2=a6e3a1  # green
regular3=f9e2af  # yellow
regular4=89b4fa  # blue
regular5=cba6f7  # mauve (accent purple)
regular6=89dceb  # sky
regular7=bac2de  # subtext1

## Bright colors
bright0=585b70   # surface2
bright1=f38ba8   # red
bright2=a6e3a1   # green
bright3=f9e2af   # yellow
bright4=89b4fa   # blue
bright5=cba6f7   # mauve
bright6=89dceb   # sky
bright7=a6adc8   # subtext0

## Selection & Miscellany
selection-background=313244
selection-foreground=cdd6f4
urls=89b4fa

[csd]
size=0
color=11111b

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=Shift+Page_Down
scrollback-down-half-page=none
scrollback-down-line=none
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert
search-start=Control+Shift+r
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
spawn-terminal=Control+Shift+n
minimize=none
maximize=none
fullscreen=none
pipe-visible=[sh -c "xurls | bemenu | xargs -r xdg-open"] Control+Shift+p

[search-bindings]
cancel=Control+g Control+c Escape
commit=Return
find-prev=Control+r
find-next=Control+s
cursor-left=Left Control+b
cursor-left-word=Control+Left Mod1+b
cursor-right=Right Control+f
cursor-right-word=Control+Right Mod1+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-prev-word=Mod1+BackSpace
delete-next=Delete
delete-next-word=Mod1+d Control+d
extend-to-word-boundary=Control+w
extend-to-next-whitespace=Control+Shift+w
clipboard-paste=Control+v Control+y
primary-paste=Shift+Insert

[url-bindings]
cancel=Control+g Control+c Control+d Escape
toggle-url-visible=t
