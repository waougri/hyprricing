# ~/.config/hypr/hyprlock.conf
# Gentoo rice lockscreen

general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = true
    text_trim = true
    fractional_scaling = 2
    screencopy_mode = 0
    fail_timeout = 1500
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = false
}

bezier = gentooEase, 0.18, 1, 0.24, 1
animation = fade, 1, 6, gentooEase
animation = inputFieldDots, 1, 5, gentooEase
animation = inputFieldFade, 1, 5, gentooEase
animation = inputFieldWidth, 1, 5, gentooEase
animation = inputFieldColors, 1, 5, gentooEase

background {
    monitor =
    path = /home/starlith/wlls/flatppuccin_4k_macchiato.png
    color = rgba(8, 10, 12, 1.0)

    blur_passes = 5
    blur_size = 10
    noise = 0.010
    contrast = 0.905
    brightness = 0.805
    vibrancy = 0.220
    vibrancy_darkness = 0.060
    zindex = -1
}

label {
    monitor =
    text = Gentoo
    color = rgba(235, 245, 235, 1.0)
    font_size = 28
    font_family = Inter
    position = 0, 270
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.75)
    shadow_boost = 1.4
}

label {
    monitor =
    text = Hello, $USER
    color = rgba(230, 230, 230, 0.95)
    font_size = 18
    font_family = Inter
    position = 0, 230
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.65)
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 95
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 7
    shadow_color = rgba(0, 0, 0, 0.80)
    shadow_boost = 1.5
}

label {
    monitor =
    text = $LAYOUT
    color = rgba(152, 255, 152, 0.95)
    font_size = 15
    font_family = JetBrains Mono
    position = 0, 25
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.65)
}

label {
    monitor =
    text = $PAMPROMPT
    color = rgba(190, 190, 190, 0.95)
    font_size = 14
    font_family = Inter
    position = 0, -70
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.65)
}

label {
    monitor =
    text = $FAIL
    color = rgba(255, 120, 120, 1.0)
    font_size = 14
    font_family = Inter
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.75)
}

input-field {
    monitor =
    size = 420, 74
    position = 0, -15
    halign = center
    valign = center

    dots_center = true
    dots_spacing = 0.30
    dots_size = 0.28

    outer_color = rgba(152, 255, 152, 0.92)
    inner_color = rgba(10, 14, 10, 0.72)
    font_color = rgba(245, 245, 245, 1.0)
    fail_color = rgba(255, 90, 90, 1.0)
    check_color = rgba(152, 255, 152, 1.0)

    outline_thickness = 2
    rounding = 20
    fade_on_empty = false
    placeholder_text = enter password
    hide_input = false

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.70)
    shadow_boost = 1.25
}

label {
    monitor =
    text = Hyprland | Gentoo | $TIME12
    color = rgba(180, 180, 180, 0.75)
    font_size = 12
    font_family = Inter
    position = 0, -180
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 1
    shadow_color = rgba(0, 0, 0, 0.55)
}
