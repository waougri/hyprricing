################
### MONITORS ###
################
monitor = DP-3, 1920x1080, 0x0, 1
monitor = HDMI-A-1, 1920x1080, 1920x0, 1
###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = dolphin 
$menu        = rofi -show drun
$browser     = firefox

#################
### AUTOSTART ###
#################
exec-once = gentoo-pipewire-launcher
exec-once = waybar
exec-once = hyprpaper
exec-once = $browser
# Use the modern first-party Gentoo polkit agent
exec-once = hyprpolkitagent 
exec-once = awww-daemon
exec-once = mako

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# AMD GPU MAX PERFORMANCE (RADV + GPL)
env = AMD_VULKAN_ICD,RADV
env = RADV_PERFTEST,gpl
env = WLR_DRM_NO_ATOMIC,1 # Can reduce stutter on 60Hz AMD setups

# Cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-green-cursors

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in  = 5
    gaps_out = 12

    border_size = 2

    # Gentoo Colors: Vibrant Lavender to Deep Larry the Cow Purple
    col.active_border   = rgba(c1a1e1ff) rgba(7353b2ff) 45deg
    col.inactive_border = rgba(1a1726cc)

    resize_on_border = true
    extend_border_grab_area = 15

    allow_tearing = false
    layout = master 
}

decoration {
    rounding       = 12
    rounding_power = 3

    # Slight transparency to show off the terminal blur
    active_opacity   = 0.94
    inactive_opacity = 0.85

    dim_inactive   = true
    dim_strength   = 0.15

    shadow {
        enabled      = true
        range        = 30
        render_power = 4
        color        = rgba(0d0814ed) # Deep Gentoo void
        color_inactive = rgba(0d081488)
        offset       = 0, 8
    }

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        noise            = 0.015
        contrast         = 1.1
        brightness       = 0.9
        vibrancy         = 0.3
        vibrancy_darkness = 0.5
        special          = true
        popups           = true
        ignore_opacity   = true # Ensures blur renders beneath semi-transparent windows
    }
}

##################
### ANIMATIONS ###
##################
animations {
    enabled = true

    # Buttery smooth curves designed specifically to look fluid at 60Hz
    # NAME,   X0,   Y0,   X1,   Y1
    bezier = fluid,      0.13, 0.99, 0.29, 1.05  # Slight overshoot for premium feel
    bezier = easeOut,    0.16, 1,    0.3,  1     # Smooth deceleration
    bezier = linear,     0,    0,    1,    1

    # Windows — slightly longer durations (4-5) allow 60Hz monitors to render the slide
    animation = windows,      1, 4.5, fluid, popin 80%
    animation = windowsIn,    1, 4.5, fluid, popin 80%
    animation = windowsOut,   1, 4,   easeOut, slide
    animation = windowsMove,  1, 4,   fluid

    # Borders — slow, elegant rotation
    animation = border,       1, 4,   easeOut
    animation = borderangle,  1, 60,  linear, loop

    # Fades — silk-smooth
    animation = fade,         1, 3.5, easeOut
    animation = fadeIn,       1, 3.5, easeOut
    animation = fadeOut,      1, 3,   easeOut
    animation = fadeDim,      1, 4,   easeOut

    # Layers (waybar, rofi)
    animation = layers,       1, 4,   fluid, slide
    animation = layersIn,     1, 4,   fluid, slide
    animation = layersOut,    1, 3,   easeOut, fade

    # Workspaces — gentle slide-fade prevents jarring horizontal jumps at 60Hz
    animation = workspaces,   1, 5,   fluid, slidefade 15%
    animation = specialWorkspace, 1, 5, fluid, slidevert
}

####################
### WINDOW RULES ###
####################
# Using the NEW March 2026 match-block syntax

windowrule {
    name = core-suppression
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = floating-tools
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|thunar)$
    float = true
    center = true
    pin = true
}

windowrule {
    name = starlith-browser
    match:class = firefox
    opacity = 1.0 override
    # Disable blur on browser to save 7700 XT cycles during video playback
    no_blur = on 
}

windowrule {
    name = dev-terminal
    match:class = alacritty
    opacity = 0.95 override 0.90 override
}

###################
### LAYER RULES ###
###################
# Targeting Waybar & Rofi with advanced Blur X-Ray
# Waybar Specific
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = xray 1, match:namespace waybar # Superior glass depth
layerrule = animation slide top, match:namespace waybar
# Explicitly provide the 'on' value for the blur effect
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
# Rofi / Launcher Specific
layerrule = ignore_alpha 0.1, match:namespace rofi
layerrule = animation popin 80%, match:namespace rofi
##############
### LAYOUT ###
##############
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

misc {
    vfr = true 
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    enable_swallow = true
    swallow_regex = ^(alacritty)$
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 
    accel_profile = flat 
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, killactive
bind = $mainMod, D, exec, $menu
bind = $mainMod, M, exec, wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, J, togglesplit
bind = $mainMod, Return, exec, $terminal

# Focus (Vim)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Audio (OpenRC / WirePlumber)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
