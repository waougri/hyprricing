# HyprToolkit Configuration File
# Location: ~/.config/hypr/hyprtoolkit.conf

# Color Settings
background = 0xFF1E1E2E           # Background color (Deep muted purple)
base = 0xFF24273A                 # Base color (Soft dark grey)
text = 0xFFD9E0EE                 # Text color (Soft light lilac)
alternate_base = 0xFF363A4F       # Alternative base color (Slightly lighter purple-grey)
bright_text = 0xFFF5E0DC          # Bright text color (Soft peachy pink)
accent = 0xFFF28FAD               # Accent color (Soft pink)
accent_secondary = 0xFF74C7EC     # Secondary accent color (Soft cyan)

# Font & Typography
h1_size = 19                      # Font size for H1
h2_size = 15                      # Font size for H2
h3_size = 13                      # Font size for H3
font_size = 11                    # Font size for regular text
small_font_size = 10              # Font size for small text
font_family = "Google Sans Code NF"        # Font family for general text
font_family_monospace = "Google Sans Code NF" # Monospace font family

# UI Element Adjustments
rounding_large = 10               # Large rounding in logical px
rounding_small = 5                # Small rounding in logical px

# Icon Theme
icon_theme = ""                   # Name of the icon theme to use (empty for "the first found")
